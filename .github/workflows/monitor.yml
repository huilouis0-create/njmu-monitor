name: 南医大通知监控

on:
  schedule:
    # 每 30 分钟运行一次（可调整）
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 也可手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 恢复历史状态缓存
        id: cache-state
        uses: actions/cache@v4
        with:
          path: state.json
          key: njmu-monitor-state-${{ github.run_id }}
          restore-keys: |
            njmu-monitor-state-

      - name: 运行监控脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: node monitor.js

      - name: 保存状态缓存（供下次使用）
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: njmu-monitor-state-${{ github.run_id }}
